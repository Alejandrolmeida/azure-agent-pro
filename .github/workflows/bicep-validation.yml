name: Bicep Validation and Linting

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Configure these values for your environment
  PROJECT_NAME: azure-agent-pro # Azure Agent Pro project name
  # Note: These variables would be configured in a real Azure environment
  # AZURE_RESOURCE_GROUP: ${{ vars.CI_RESOURCE_GROUP || 'azure-agent-pro-ci' }}
  # AZURE_LOCATION: ${{ vars.DEFAULT_LOCATION || 'eastus' }}
  AZURE_RESOURCE_GROUP: "azure-agent-pro-ci"
  AZURE_LOCATION: "eastus"

jobs:
  bicep-validation:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az version

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Bicep Linting
        run: |
          echo "🔍 Running Bicep linting..."
          mkdir -p temp
          while IFS= read -r file; do
            echo "Linting: $file"
            az bicep build --file "$file" --outdir temp/
          done < <(find bicep -name "*.bicep" -type f | sort)

      - name: Bicep Validation - Development
        if: false # Disabled for educational project - requires real Azure subscription
        run: |
          echo "✅ Validating Bicep templates for development environment..."
          az deployment group validate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters @bicep/parameters/dev.parameters.json \
            --verbose

      - name: Bicep What-If Analysis
        if: false # Disabled for educational project - requires real Azure subscription
        run: |
          echo "📊 Running What-If analysis..."
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters @bicep/parameters/dev.parameters.json \
            --result-format FullResourcePayloads

      - name: Security and Best Practices Check
        run: |
          echo "🔒 Running security checks..."
          # Informational only: avoid false positives from legitimate Key Vault / key names.
          if grep -r -E "(password|secret|connectionString)[[:space:]]*=" bicep/ --include="*.bicep"; then
            echo "Warning: potential hardcoded secret pattern found"
          fi

          if grep -r -E "(password|secret|connectionString)[[:space:]]*=" bicep/ --include="*.bicep" | grep -v "@secure"; then
            echo "Warning: consider using @secure() for sensitive parameters"
          fi

          echo "Security checks completed"

      - name: Upload Bicep Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bicep-compiled-templates
          path: temp/*.json
          retention-days: 30

  # Live deployment tests intentionally remain out of this workflow because this
  # educational repository does not own a shared Azure subscription. Use
  # deploy-azure.yml after configuring OIDC secrets and GitHub environments.
