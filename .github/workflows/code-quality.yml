name: Code Quality and Security

# DISABLED: This workflow requires additional setup and causes notification spam
# Re-enable when ready to configure linters and security scanners properly
on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]
  # schedule:
  #   # Run security scan weekly on Sundays at 02:00 UTC
  #   - cron: "0 2 * * 0"

jobs:
  shellcheck:
    name: Shell Script Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          echo "🔍 Running ShellCheck on all shell scripts..."
          EXIT_CODE=0
          find scripts/ -name "*.sh" -type f | while read -r file; do
            echo "Checking: $file"
            if ! shellcheck "$file"; then
              EXIT_CODE=1
            fi
          done

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ ShellCheck found issues!"
            exit 1
          else
            echo "✅ All shell scripts passed ShellCheck!"
          fi

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run Markdown Lint
        run: |
          echo "📝 Running Markdown linting..."
          markdownlint "**/*.md" --ignore node_modules || true
          echo "✅ Markdown linting completed"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Credential Scanning
        run: |
          echo "🔒 Scanning for potential credentials..."

          # Basic credential patterns
          PATTERNS=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api_key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]+['\"]"
            "AKIA[0-9A-Z]{16}"  # AWS Access Key
            "AIza[0-9A-Za-z\\-_]{35}"  # Google API Key
            "sk-[a-zA-Z0-9]{48}"  # OpenAI API Key
          )

          FOUND_ISSUES=false

          for pattern in "${PATTERNS[@]}"; do
            if grep -r -E "$pattern" . --exclude-dir=.git --exclude-dir=node_modules; then
              echo "❌ Potential credential found with pattern: $pattern"
              FOUND_ISSUES=true
            fi
          done

          if [ "$FOUND_ISSUES" = true ]; then
            echo "⚠️ Please review the potential credentials found above"
            # Don't fail the build, just warn
          else
            echo "✅ No obvious credentials found"
          fi

  bicep-security:
    name: Bicep Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bicep Security Checks
        run: |
          echo "🔒 Running Bicep security analysis..."

          # Informational checks only: avoid false positives on educational samples.
          if find bicep/ -name "*.bicep" -exec grep -l "supportsHttpsTrafficOnly.*false" {} \; 2>/dev/null | grep -q .; then
            echo "Warning: found storage accounts without HTTPS enforcement"
          fi

          if find bicep/ -name "*.bicep" -exec grep -l "Standard_LRS" {} \; 2>/dev/null | grep -q .; then
            echo "Info: consider using ZRS or GRS for production workloads"
          fi

          if grep -r -E "(password|secret|connectionString)[[:space:]]*=" bicep/ --include="*.bicep"; then
            echo "Potential hardcoded secret pattern found"
          fi

          echo "Bicep security checks completed"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  code-quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [shellcheck, markdown-lint, security-scan, bicep-security]
    if: always()

    steps:
      - name: Quality Summary
        run: |
          echo "📊 Code Quality Summary:"
          echo "- ShellCheck: ${{ needs.shellcheck.result }}"
          echo "- Markdown Lint: ${{ needs.markdown-lint.result }}"
          echo "- Security Scan: ${{ needs.security-scan.result }}"
          echo "- Bicep Security: ${{ needs.bicep-security.result }}"

          # Simple check - don't fail on summary, just report
          echo "✅ Quality check summary completed!"
